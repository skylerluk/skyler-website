<!doctype html>
<!-- spike debug page: raw three.js textured-box sanity test (delete before merge) -->
<html>
<body style="margin:0;background:#111">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.180.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from "three";
const log = (m) => { document.title = m; console.log("GLTEST", m); };
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.addEventListener("webglcontextlost", () => log("CONTEXT LOST"));
const scene = new THREE.Scene();
scene.background = new THREE.Color("#222");
const cam = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 100);
cam.position.set(0, 2, 3); cam.lookAt(0, 0, 0);
scene.add(new THREE.AmbientLight(0xffffff, 2));
const tex = new THREE.TextureLoader().load("/assets/wood/oak_diff.jpg", () => log("texture loaded"));
tex.colorSpace = THREE.SRGBColorSpace;
const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 1.4), new THREE.MeshStandardMaterial({ map: tex }));
scene.add(mesh);
renderer.setAnimationLoop(() => { mesh.rotation.y += 0.003; renderer.render(scene, cam); });
log("running");
</script>
</body>
</html>
